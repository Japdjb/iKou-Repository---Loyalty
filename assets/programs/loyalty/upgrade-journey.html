<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <style>
    :root {
      --bg: #ececec;
      --text: #222;
      --line: #2f2f2f;

      --purple-fill: #c7bbff;
      --purple-stroke: #7450ff;

      --yellow-fill: #f6e0a3;
      --yellow-stroke: #e0a11b;

      --green-fill: #bfe9bf;
      --green-stroke: #59b86a;

      --teal-fill: #baf5f2;
      --teal-stroke: #42d3cd;

      --shadow: 0 18px 50px rgba(0, 0, 0, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      width: 100%;
      min-height: 100vh;
      overflow-x: auto;
    }

    .board {
      position: relative;
      width: 1600px;
      height: 860px;
      margin: 0 auto;
      background: var(--bg);
    }

    .title-pill {
      position: absolute;
      top: 12px;
      left: 12px;
      background: #d6d6d6;
      border: 1px solid #9b9b9b;
      border-radius: 8px;
      font-size: 22px;
      font-weight: 700;
      padding: 8px 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.5);
      z-index: 4;
    }

    .hint {
      position: absolute;
      top: 14px;
      right: 16px;
      font-size: 12px;
      color: #666;
      background: rgba(255,255,255,.65);
      padding: 6px 10px;
      border-radius: 999px;
      z-index: 4;
    }

    .node {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      border: 0;
      background: transparent;
      padding: 0;
      z-index: 2;
      transition: transform .16s ease, filter .16s ease, box-shadow .16s ease;
    }

    .node:hover {
      transform: translateY(-2px);
      filter: brightness(1.02);
    }

    .node.active {
      box-shadow: 0 0 0 5px rgba(17,17,17,.08), 0 0 0 10px rgba(116,80,255,.08);
      border-radius: 18px;
      transform: translateY(-2px) scale(1.01);
    }

    .node-label {
      position: absolute;
      top: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      text-align: center;
      font-size: 8.5px;
      line-height: 1.25;
      color: #222;
      font-weight: 700;
      text-transform: uppercase;
    }

    .node-label .desc {
      display: block;
      margin-top: 4px;
      font-size: 8px;
      font-weight: 400;
      text-transform: none;
      line-height: 1.25;
    }

    .shape-envelope {
      width: 78px;
      height: 54px;
      border-radius: 8px;
      background: var(--purple-fill);
      border: 2px solid var(--purple-stroke);
      position: relative;
    }

    .shape-envelope:before,
    .shape-envelope:after {
      content: "";
      position: absolute;
      top: 13px;
      height: 2px;
      background: var(--purple-stroke);
      width: 34px;
    }

    .shape-envelope:before {
      left: 5px;
      transform: rotate(34deg);
      transform-origin: left center;
    }

    .shape-envelope:after {
      right: 5px;
      transform: rotate(-34deg);
      transform-origin: right center;
    }

    .shape-circle {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      background: var(--yellow-fill);
      border: 2px solid var(--yellow-stroke);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px 8px;
      font-size: 7.2px;
      line-height: 1.15;
      font-weight: 700;
      text-transform: uppercase;
    }

    .shape-trigger {
      width: 72px;
      height: 72px;
      background: var(--teal-fill);
      border: 2px solid var(--teal-stroke);
      clip-path: polygon(0 46%, 42% 46%, 42% 0, 100% 50%, 42% 100%, 42% 54%, 0 54%);
    }

    .shape-finish {
      width: 92px;
      height: 48px;
      background: var(--green-fill);
      border: 2px solid var(--green-stroke);
      clip-path: polygon(0 0, 78% 0, 100% 50%, 78% 100%, 0 100%, 14% 50%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #2d6c38;
    }

    .tiny {
      position: absolute;
      font-size: 9px;
      color: #444;
      z-index: 1;
    }

    svg.lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 20;
    }

    .overlay.open { display: flex; }

    .modal {
      width: min(720px, 100%);
      background: #fff;
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .modal-header {
      padding: 18px 22px 14px;
      border-bottom: 1px solid #ececec;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #777;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .modal-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .close-btn {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 0;
      background: #f2f2f2;
      font-size: 20px;
      cursor: pointer;
    }

    .modal-body {
      padding: 22px;
    }

    .modal-body p {
      margin: 0 0 14px;
      line-height: 1.55;
      font-size: 15px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .meta-card {
      background: #f7f7f7;
      border: 1px solid #ececec;
      border-radius: 12px;
      padding: 14px;
    }

    .meta-card h4 {
      margin: 0 0 6px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #666;
    }

    .meta-card p {
      margin: 0;
      font-size: 14px;
      line-height: 1.45;
    }
  </style>
</head>

        description: "The journey ends here after reward redemption or completion of the reminder path.",
        section: "Completion",
        logic: "Terminal step for all branches."
      }
    };

    const overlay = document.getElementById("overlay");
    const closeBtn = document.getElementById("closeBtn");
    const modalEyebrow = document.getElementById("modalEyebrow");
    const modalTitle = document.getElementById("modalTitle");
    const modalDescription = document.getElementById("modalDescription");
    const modalSection = document.getElementById("modalSection");
    const modalLogic = document.getElementById("modalLogic");
    const nodes = document.querySelectorAll(".node");

    function openModal(id, node) {
      const data = tokenData[id];
      if (!data) return;

      nodes.forEach(n => n.classList.remove("active"));
      node.classList.add("active");

      modalEyebrow.textContent = data.eyebrow;
      modalTitle.textContent = data.title;
      modalDescription.textContent = data.description;
      modalSection.textContent = data.section;
      modalLogic.textContent = data.logic;

      overlay.classList.add("open");
      overlay.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      overlay.classList.remove("open");
      overlay.setAttribute("aria-hidden", "true");
      nodes.forEach(n => n.classList.remove("active"));
    }

    nodes.forEach(node => {
      node.addEventListener("click", (e) => {
        e.stopPropagation();
        openModal(node.dataset.id, node);
      });
    });

    closeBtn.addEventListener("click", closeModal);
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closeModal();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });
  </script>
</body>
</html>
