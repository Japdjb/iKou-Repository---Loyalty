<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Spend to Maintain / Demotion</title>
<style>
  :root{
    --bg:#FFF5ED; --lav:#E8DEF5; --olive:#383317; --blue:#CFF0FF; --burg:#570A05;
    --brown:#331700; --yellow:#EDE8BA; --choc:#543312; --rose:#DBA6A1; --stroke:rgba(84,51,18,.12);
  }
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{
    font-family:Inter,Arial,sans-serif; overflow:hidden; color:var(--brown);
    background:
      radial-gradient(circle at top right, rgba(232,222,245,.62), transparent 28%),
      radial-gradient(circle at bottom left, rgba(207,240,255,.28), transparent 24%),
      var(--bg);
  }
  .card{height:100vh;padding:18px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--stroke);border-radius:16px;background:rgba(255,250,246,.76)}
  .eyebrow{font:700 10px/1 Inter,Arial,sans-serif;letter-spacing:.16em;text-transform:uppercase;color:var(--burg);margin-bottom:8px}
  .brand{font:600 18px/1.05 Georgia,"Times New Roman",serif;letter-spacing:.08em;margin-bottom:10px}
  h1{margin:0 0 10px;font:600 clamp(20px,4.8vw,38px)/.92 Georgia,"Times New Roman",serif}
  p{margin:0;font-size:12px;line-height:1.45;color:var(--choc);max-width:94%}
  .lanes{display:grid;gap:10px;margin:8px 0 14px}
  .lane{
    padding:10px;border-radius:14px;background:rgba(255,255,255,.72);
    border:1px solid rgba(84,51,18,.10); box-shadow:0 8px 18px rgba(56,51,23,.05);
  }
  .lane h2{margin:0 0 8px;font:600 13px/1 Georgia,"Times New Roman",serif}
  .track{display:flex;gap:6px;align-items:center}
  .mail,.split,.wait,.finish{
    width:20px;height:20px;border:1.2px solid rgba(84,51,18,.14);background:#fff;border-radius:6px;
  }
  .mail{background:linear-gradient(180deg, rgba(232,222,245,.98), rgba(232,222,245,.82))}
  .split{transform:rotate(45deg);border-radius:7px;background:linear-gradient(180deg, rgba(237,232,186,.96), rgba(255,245,237,.96))}
  .wait{background:linear-gradient(180deg, rgba(207,240,255,.96), rgba(207,240,255,.82));clip-path:polygon(28% 0,72% 0,100% 28%,100% 72%,72% 100%,28% 100%,0 72%,0 28%);border-radius:0}
  .finish{background:linear-gradient(180deg,var(--olive),var(--choc));border-color:rgba(56,51,23,.9)}
  .line{width:10px;height:2px;background:rgba(84,51,18,.45)}
  .footer{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .badge{padding:5px 8px;border-radius:999px;font-size:10px;font-weight:600;border:1px solid rgba(87,10,5,.14);background:rgba(219,166,161,.16);color:var(--burg)}
  .hint{font-size:10px;color:#7a6a5d}
</style>
</head>
<body>
  <div class="card">
    <div>
      <div class="eyebrow">IKOU Loyalty</div>
      <div class="brand">IKOU</div>
      <h1>Spend to Maintain / Demotion</h1>
      <p>Retention review journeys for Levels 2–4 with maintain-status reminders, hold periods, and demotion notices.</p>
    </div>

    <div class="lanes">
      <div class="lane"><h2>Level 2</h2><div class="track"><span class="mail"></span><span class="line"></span><span class="split"></span><span class="line"></span><span class="mail"></span><span class="line"></span><span class="wait"></span><span class="line"></span><span class="finish"></span></div></div>
      <div class="lane"><h2>Level 3</h2><div class="track"><span class="mail"></span><span class="line"></span><span class="split"></span><span class="line"></span><span class="mail"></span><span class="line"></span><span class="wait"></span><span class="line"></span><span class="finish"></span></div></div>
      <div class="lane"><h2>Level 4</h2><div class="track"><span class="mail"></span><span class="line"></span><span class="split"></span><span class="line"></span><span class="mail"></span><span class="line"></span><span class="wait"></span><span class="line"></span><span class="finish"></span></div></div>
    </div>

    <div class="footer">
      <span class="badge">Retention Risk</span>
      <span class="hint">Interactive flow available</span>
    </div>
  </div>
</body>
</html>
