<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Onboarding — Existing Customers</title>
<style>
  :root{
    --bg:#FFF5ED;
    --lav:#E8DEF5;
    --olive:#383317;
    --blue:#CFF0FF;
    --burg:#570A05;
    --brown:#331700;
    --yellow:#EDE8BA;
    --choc:#543312;
    --rose:#DBA6A1;
    --stroke:rgba(84,51,18,.12);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:Inter,Arial,sans-serif;
    background:
      radial-gradient(circle at top right, rgba(232,222,245,.65), transparent 28%),
      radial-gradient(circle at bottom left, rgba(207,240,255,.55), transparent 24%),
      var(--bg);
    color:var(--brown);
    overflow:hidden;
  }
  .card{
    height:100vh;
    padding:18px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    border:1px solid var(--stroke);
    border-radius:16px;
    background:rgba(255,250,246,.74);
  }
  .eyebrow{
    font:700 10px/1 Inter,Arial,sans-serif;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--burg);
    margin-bottom:8px;
  }
  .brand{
    font:600 18px/1.05 Georgia,"Times New Roman",serif;
    letter-spacing:.08em;
    margin-bottom:10px;
  }
  h1{
    margin:0 0 10px;
    font:600 clamp(22px,5vw,40px)/.92 Georgia,"Times New Roman",serif;
  }
  p{
    margin:0;
    font-size:12px;
    line-height:1.45;
    color:var(--choc);
    max-width:90%;
  }
  .visual{
    position:relative;
    height:82px;
    margin:10px 0 14px;
  }
  .line{
    position:absolute; left:28px; right:28px; top:40px;
    height:2px; background:rgba(84,51,18,.55);
  }
  .node{
    position:absolute; top:18px;
    width:44px; height:44px; border-radius:12px;
    border:1.5px solid rgba(84,51,18,.18);
    background:#fff;
    box-shadow:0 8px 20px rgba(56,51,23,.08);
  }
  .n1{left:10px;background:linear-gradient(180deg, rgba(207,240,255,.95), rgba(207,240,255,.75))}
  .n2{left:78px;background:linear-gradient(180deg, rgba(232,222,245,.98), rgba(232,222,245,.84))}
  .n3{left:146px;transform:rotate(45deg);border-radius:14px;background:linear-gradient(180deg, rgba(237,232,186,.96), rgba(255,245,237,.96))}
  .n4{left:218px;background:linear-gradient(180deg, rgba(232,222,245,.98), rgba(232,222,245,.84))}
  .n5{left:286px;background:linear-gradient(180deg, rgba(237,232,186,.96), rgba(255,245,237,.96));transform:rotate(45deg);border-radius:14px}
  .n6{right:12px;background:linear-gradient(180deg, var(--olive), var(--choc));border-color:rgba(56,51,23,.9)}
  .footer{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .badge{
    padding:5px 8px; border-radius:999px;
    font-size:10px; font-weight:600;
    border:1px solid rgba(87,10,5,.14);
    background:rgba(219,166,161,.16);
    color:var(--burg);
  }
  .hint{font-size:10px;color:#7a6a5d}
</style>
</head>
<body>
  <div class="card">
    <div>
      <div class="eyebrow">IKOU Loyalty</div>
      <div class="brand">IKOU</div>
      <h1>Onboarding — Existing Customers</h1>
      <p>Existing-customer loyalty entry paths for active and reactivated purchasers.</p>
    </div>

    <div class="visual">
      <div class="line"></div>
      <div class="node n1"></div>
      <div class="node n2"></div>
      <div class="node n3"></div>
      <div class="node n4"></div>
      <div class="node n5"></div>
      <div class="node n6"></div>
    </div>

    <div class="footer">
      <span class="badge">Welcome</span>
      <span class="hint">Interactive flow available</span>
    </div>
  </div>
</body>
</html>
