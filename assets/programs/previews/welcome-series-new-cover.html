<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Welcome Series – New</title>
<style>
  :root{
    --bg:#FFF5ED; --lav:#E8DEF5; --olive:#383317; --blue:#CFF0FF; --burg:#570A05;
    --brown:#331700; --yellow:#EDE8BA; --choc:#543312; --rose:#DBA6A1; --stroke:rgba(84,51,18,.12);
  }
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{
    font-family:Inter,Arial,sans-serif; overflow:hidden; color:var(--brown);
    background:
      radial-gradient(circle at top right, rgba(232,222,245,.68), transparent 28%),
      radial-gradient(circle at bottom left, rgba(219,166,161,.24), transparent 24%),
      var(--bg);
  }
  .card{
    height:100vh;padding:18px;display:flex;flex-direction:column;justify-content:space-between;
    border:1px solid var(--stroke);border-radius:16px;background:rgba(255,250,246,.74)
  }
  .eyebrow{
    font:700 10px/1 Inter,Arial,sans-serif;letter-spacing:.16em;text-transform:uppercase;
    color:var(--burg);margin-bottom:8px
  }
  .brand{
    font:600 18px/1.05 Georgia,"Times New Roman",serif;letter-spacing:.08em;margin-bottom:10px
  }
  h1{margin:0 0 10px;font:600 clamp(22px,5vw,40px)/.92 Georgia,"Times New Roman",serif}
  p{margin:0;font-size:12px;line-height:1.45;color:var(--choc);max-width:90%}

  .stages{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin:8px 0 14px;
  }
  .stage{
    border:1px solid rgba(84,51,18,.10);
    border-radius:14px;
    padding:10px;
    background:rgba(255,255,255,.7);
    box-shadow:0 8px 20px rgba(56,51,23,.06);
  }
  .stage h2{
    margin:0 0 8px;
    font:600 14px/1 Georgia,"Times New Roman",serif
  }

  .track{
    display:flex;
    gap:6px;
    align-items:center;
    flex-wrap:wrap;
  }

  .box,.diamond,.finish,.wait{
    width:22px;height:22px;border:1.2px solid rgba(84,51,18,.16);background:#fff;border-radius:6px;
    flex:0 0 auto;
  }
  .box{
    background:linear-gradient(180deg, rgba(232,222,245,.98), rgba(232,222,245,.82));
  }
  .diamond{
    transform:rotate(45deg);
    background:linear-gradient(180deg, rgba(237,232,186,.96), rgba(255,245,237,.96));
    border-radius:8px;
  }
  .wait{
    width:28px;
    height:16px;
    border-radius:999px;
    background:linear-gradient(180deg, rgba(255,250,246,.98), rgba(246,238,227,.94));
  }
  .finish{
    background:linear-gradient(180deg, var(--olive), var(--choc));
    border-color:rgba(56,51,23,.9)
  }
  .line{
    width:14px;height:2px;background:rgba(84,51,18,.45);flex:0 0 auto;
  }

  .footer{
    display:flex;align-items:center;justify-content:space-between;gap:10px
  }
  .badge{
    padding:5px 8px;border-radius:999px;font-size:10px;font-weight:600;
    border:1px solid rgba(87,10,5,.14);background:rgba(219,166,161,.16);color:var(--burg)
  }
  .hint{font-size:10px;color:#7a6a5d}
</style>
</head>
<body>
  <div class="card">
    <div>
      <div class="eyebrow">IKOU CRM Documentation</div>
      <div class="brand">IKOU</div>
      <h1>Welcome Series – New</h1>
      <p>New-customer onboarding sequence covering welcome, loyalty introduction, product education, reward reminder, and lead-flow routing.</p>
    </div>

    <div class="stages">
      <div class="stage">
        <h2>Onboarding</h2>
        <div class="track">
          <span class="box"></span>
          <span class="line"></span>
          <span class="wait"></span>
          <span class="line"></span>
          <span class="box"></span>
          <span class="line"></span>
          <span class="wait"></span>
          <span class="line"></span>
          <span class="box"></span>
        </div>
      </div>

      <div class="stage">
        <h2>Decision &amp; Reward</h2>
        <div class="track">
          <span class="diamond"></span>
          <span class="line"></span>
          <span class="wait"></span>
          <span class="line"></span>
          <span class="diamond"></span>
          <span class="line"></span>
          <span class="box"></span>
        </div>
      </div>

      <div class="stage">
        <h2>Outcome</h2>
        <div class="track">
          <span class="diamond"></span>
          <span class="line"></span>
          <span class="box"></span>
          <span class="line"></span>
          <span class="finish"></span>
        </div>
      </div>
    </div>

    <div class="footer">
      <span class="badge">Welcome &amp; Loyalty</span>
      <span class="hint">Interactive flow available</span>
    </div>
  </div>
</body>
</html>
