<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Adhoc Rewards</title>
<style>
  :root{
    --bg:#FFF5ED; --lav:#E8DEF5; --olive:#383317; --blue:#CFF0FF; --burg:#570A05;
    --brown:#331700; --yellow:#EDE8BA; --choc:#543312; --rose:#DBA6A1;
    --pink:#ff62c7; --orange:#ff5a1f; --stroke:rgba(84,51,18,.12);
  }
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{
    font-family:Inter,Arial,sans-serif; overflow:hidden; color:var(--brown);
    background:
      radial-gradient(circle at top right, rgba(232,222,245,.5), transparent 28%),
      radial-gradient(circle at bottom left, rgba(255,226,244,.28), transparent 24%),
      var(--bg);
  }
  .card{height:100vh;padding:18px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--stroke);border-radius:16px;background:rgba(255,250,246,.76)}
  .eyebrow{font:700 10px/1 Inter,Arial,sans-serif;letter-spacing:.16em;text-transform:uppercase;color:var(--burg);margin-bottom:8px}
  .brand{font:600 18px/1.05 Georgia,"Times New Roman",serif;letter-spacing:.08em;margin-bottom:10px}
  h1{margin:0 0 10px;font:600 clamp(22px,5vw,40px)/.92 Georgia,"Times New Roman",serif}
  p{margin:0;font-size:12px;line-height:1.45;color:var(--choc);max-width:92%}
  .visual{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:8px 0 14px}
  .campaign{
    width:34%; min-height:96px; border-radius:16px;
    background:linear-gradient(180deg, rgba(255,226,244,.96), rgba(255,245,237,.96));
    border:2px solid rgba(255,98,199,.48); padding:12px;
  }
  .campaign .cap,.content .cap{font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--burg);margin-bottom:6px}
  .arrow{flex:0 0 26px;height:2px;background:rgba(84,51,18,.45);position:relative}
  .arrow:after{content:"";position:absolute;right:-1px;top:-4px;border-left:8px solid rgba(84,51,18,.55);border-top:5px solid transparent;border-bottom:5px solid transparent}
  .content{
    width:26%; display:grid; gap:8px;
  }
  .block{
    border:2px solid rgba(255,90,31,.72); border-radius:14px; padding:11px; background:rgba(255,255,255,.8);
  }
  .line{height:3px;background:rgba(255,90,31,.92);border-radius:999px}
  .l1{width:74%;margin-bottom:8px}.l2{width:20%}
  .footer{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .badge{padding:5px 8px;border-radius:999px;font-size:10px;font-weight:600;border:1px solid rgba(87,10,5,.14);background:rgba(219,166,161,.16);color:var(--burg)}
  .hint{font-size:10px;color:#7a6a5d}
</style>
</head>
<body>
  <div class="card">
    <div>
      <div class="eyebrow">IKOU Loyalty</div>
      <div class="brand">IKOU</div>
      <h1>Adhoc Rewards</h1>
      <p>One-off reward communication logic for surprise-and-delight offers, bi-annual gifts, and time-bound redemption prompts.</p>
    </div>

    <div class="visual">
      <div class="campaign">
        <div class="cap">Campaign launch</div>
        <div style="font-weight:700;margin-bottom:4px">Reward in market</div>
        <div style="font-size:11px;color:var(--choc)">Initial reward visibility</div>
      </div>
      <div class="arrow"></div>
      <div class="content">
        <div class="block"><div class="line l1"></div><div class="line l2"></div></div>
        <div class="block"><div class="line l1"></div><div class="line l2"></div></div>
      </div>
      <div class="arrow"></div>
      <div class="content">
        <div class="block"><div class="line l1"></div><div class="line l2"></div></div>
        <div class="block"><div class="line l1"></div><div class="line l2"></div></div>
      </div>
    </div>

    <div class="footer">
      <span class="badge">Lifecycle</span>
      <span class="hint">Interactive asset available</span>
    </div>
  </div>
</body>
</html>
