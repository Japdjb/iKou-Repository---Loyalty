<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>IKOU Loyalty Comms Directory</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#ffffff;
  --panel:#ffffff;
  --muted:#6b7280;
  --text:#0b0c0f;
  --brand:#ff6a00;
  --brand-2:#cc5400;
  --stroke:#e5e7eb;
  --mono: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Courier New",monospace;
  --elev: 0 10px 30px rgba(17,24,39,.06);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:#fafafa;
  color:var(--text);
}

.container{max-width:1200px;margin:0 auto;padding:24px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.brand{display:flex;gap:10px;align-items:center;font-weight:700}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--brand)}
h1{margin:0;font-size:26px}

.panel{background:#fff;border:1px solid var(--stroke);border-radius:14px;box-shadow:var(--elev)}
.tabs{display:flex;padding:12px;border-bottom:1px solid var(--stroke);gap:8px}
.tab{padding:8px 14px;border:1px solid var(--stroke);border-radius:10px;background:#fff;font-weight:600;cursor:pointer}
.tab[aria-selected="true"]{background:var(--brand);color:#fff;border-color:var(--brand)}

.toolbar{
  display:grid;
  grid-template-columns:1fr 220px 200px 150px;
  gap:10px;
  padding:14px;
}

input,select{
  padding:10px;
  border:1px solid var(--stroke);
  border-radius:10px;
  width:100%;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:14px;
  padding:14px;
}

.card{
  background:#fff;
  border:1px solid var(--stroke);
  border-radius:14px;
  padding:14px;
  box-shadow:var(--elev);
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* FIXED IMAGE DISPLAY */
.thumb-card{
  width:100%;
  height:220px;
  object-fit:contain;
  object-position:center;
  border:1px solid var(--stroke);
  border-radius:10px;
  background:#fff;
}

.thumb-hero{
  width:100%;
  height:520px;
  object-fit:contain;
  object-position:center;
  border:1px solid var(--stroke);
  border-radius:10px;
  background:#fff;
}

.badge{
  font-size:12px;
  padding:4px 8px;
  border:1px solid var(--stroke);
  border-radius:999px;
}

.btn{
  padding:8px 12px;
  border-radius:10px;
  border:1px solid var(--stroke);
  cursor:pointer;
  font-weight:600;
}

.btn.primary{
  background:var(--brand);
  color:#fff;
  border-color:var(--brand);
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  z-index:1000;
}

.overlay.show{display:block}

.ov-panel{
  position:absolute;
  inset:40px;
  background:#fff;
  border-radius:14px;
  display:flex;
  flex-direction:column;
}

.ov-bar{
  padding:10px 14px;
  border-bottom:1px solid var(--stroke);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.ov-content{
  padding:20px;
  overflow:auto;
}

.row{display:flex;justify-content:space-between;align-items:center}
.meta{display:flex;gap:6px;flex-wrap:wrap}
.muted{color:var(--muted)}

#prog-doc h1{font-size:18px}
#prog-doc h2{font-size:15px;margin-top:14px}
#prog-doc ul{padding-left:18px}
#prog-doc code{background:#f3f4f6;padding:2px 6px;border-radius:6px;font-family:var(--mono)}

@media (max-width:900px){
  .toolbar{grid-template-columns:1fr 1fr}
}
</style>
</head>

<body>

<div class="container">
<header>
  <div class="brand"><span class="dot"></span><h1>IKOU Loyalty Comms</h1></div>
  <div class="muted">Executive + Deep Dive</div>
</header>

<section class="panel">
<div class="tabs">
  <button id="tab-programs" class="tab" aria-selected="true">Programs</button>
  <button id="tab-emails" class="tab" aria-selected="false">Emails</button>
</div>

<div class="toolbar">
  <input type="search" id="q" placeholder="Search programs">
  <select id="phaseFilter">
    <option value="">All phases</option>
    <option value="01-welcome">01 — Welcome</option>
    <option value="02-lifecycle">02 — Lifecycle</option>
    <option value="03-tier-progression">03 — Tier progression</option>
    <option value="04-retention-risk">04 — Retention risk</option>
  </select>
  <div style="display:flex;gap:8px;align-items:center">
    <button id="mode-exec" class="btn primary">Executive</button>
    <button id="mode-deep" class="btn">Deep dive</button>
  </div>
  <select id="sort">
    <option value="order_asc">Journey order</option>
    <option value="name_asc">Name A→Z</option>
  </select>
</div>

<div id="programs-view" class="grid"></div>
<div id="emails-view" class="grid" style="display:none"></div>

</section>
</div>

<div id="prog-overlay" class="overlay">
<div class="ov-panel">
<div class="ov-bar">
  <div id="prog-title"></div>
  <button id="prog-close" class="btn">Close</button>
</div>

<div class="ov-content">

<img id="prog-img" class="thumb-hero">

<div id="prog-meta" class="muted" style="margin-top:10px"></div>
<div id="prog-desc" class="muted" style="margin-top:10px"></div>

<div id="prog-doc" style="margin-top:20px"></div>

<div id="email-preview-wrap" style="display:none;margin-top:20px">
  <div class="row">
    <div><strong>Email Preview</strong></div>
    <button id="email-preview-close" class="btn">Close preview</button>
  </div>
  <iframe id="email-preview-frame" style="width:100%;height:520px;border:1px solid var(--stroke);border-radius:10px"></iframe>
</div>

<h3 style="margin-top:20px">Included Emails</h3>
<div id="prog-emails" class="grid" style="grid-template-columns:1fr"></div>

</div>
</div>
</div>

<script>
let STATE={mode:"exec",programs:[],emails:[],active:null}

function el(id){return document.getElementById(id)}
function escapeHTML(str){return(str||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")}

async function fetchJSON(p){const r=await fetch(p);if(!r.ok)throw new Error();return r.json()}
async function fetchText(p){const r=await fetch(p);if(!r.ok)throw new Error();return r.text()}

function setMode(m){
STATE.mode=m
el("mode-exec").classList.toggle("primary",m==="exec")
el("mode-deep").classList.toggle("primary",m==="deep")
if(STATE.active)renderProgramDoc(STATE.active)
}

function closeOverlay(){el("prog-overlay").classList.remove("show");STATE.active=null}

async function renderProgramDoc(p){
const target=el("prog-doc")
const path=(STATE.mode==="exec")?p.execDoc:p.deepDoc
if(!path){target.innerHTML="No doc found";return}
const md=await fetchText(path)
target.innerHTML="<pre>"+escapeHTML(md)+"</pre>"
}

function renderProgramEmails(p){
const root=el("prog-emails")
root.innerHTML=""
const rows=STATE.emails.filter(e=>e.programId===p.id)
if(!rows.length){root.innerHTML="<div class='card'>No emails mapped yet</div>";return}
rows.forEach(email=>{
const card=document.createElement("div")
card.className="card"
card.innerHTML=`
<div class="row">
<div>${email.title}</div>
<button class="btn primary">Preview</button>
</div>
`
card.querySelector("button").addEventListener("click",()=>{
el("email-preview-frame").src=email.previewPath
el("email-preview-wrap").style.display=""
})
root.appendChild(card)
})
}

function openProgram(p){
STATE.active=p
el("prog-title").textContent=p.title
el("prog-img").src=p.programScreenshot||""
el("prog-meta").textContent=p.phase+" • "+(p.status||"Draft")
el("prog-desc").textContent=p.description||""
renderProgramDoc(p)
renderProgramEmails(p)
el("prog-overlay").classList.add("show")
}

function buildCard(p){
const card=document.createElement("div")
card.className="card"
card.innerHTML=`
<img src="${p.programScreenshot||""}" class="thumb-card">
<div class="row">
<div><strong>${p.title}</strong></div>
<span class="badge">${p.phase}</span>
</div>
<div class="muted">${p.description||""}</div>
<button class="btn primary">Open</button>
`
card.querySelector("button").addEventListener("click",()=>openProgram(p))
return card
}

function renderPrograms(){
const root=el("programs-view")
root.innerHTML=""
STATE.programs.forEach(p=>root.appendChild(buildCard(p)))
}

async function init(){
el("mode-exec").onclick=()=>setMode("exec")
el("mode-deep").onclick=()=>setMode("deep")
el("prog-close").onclick=closeOverlay
el("email-preview-close").onclick=()=>{el("email-preview-wrap").style.display="none"}
STATE.programs=await fetchJSON("data/programs.json")
STATE.emails=await fetchJSON("data/emails.json")
renderPrograms()
}

document.addEventListener("DOMContentLoaded",init)
</script>

</body>
</html>
